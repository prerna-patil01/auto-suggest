<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoSuggest</title>
    <link rel="stylesheet" href="../css/autosuggest.css">
</head>

<body>

    <!-- Status Bar -->
    <div class="status-bar">
        <span class="gear" aria-label="Settings">&#x2699;</span>

        <div class="status-info">
            <span>&#x2022; Online</span>
            <span>|</span>
            <span>&#x23F0; - ms</span>
        </div>
    </div>

    <!-- Title -->
    <div class="title-container">
        <h1 class="title">
            <span class="being">Being</span>Infinity
        </h1>
    </div>

    <!-- Subtitle -->
    <p id="ip">
        One million phrases. Four Algorithms. Prefix Based Auto Suggest
    </p>

    <!-- Search Bar -->
    <div class="Container">
        <span class="lens">&#x1F50D;</span>

        <input
            class="searchbox"
            type="text"
            placeholder="Start typing to search......"
            id="search-bar"
        >
    </div>

    <!-- Suggestions Dropdown -->
    <div id="search-suggestions"></div>

    <script src="../js/autosuggest.js"></script>

</body>
</html>
